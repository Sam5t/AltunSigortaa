<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap / Kayıt Ol - Altun Sigorta</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --ana-mavi: #0056b3;     
            --koyu-mavi: #0B192C;    
            --koyu-gri: #444444;
            --beyaz: #ffffff;
            --arka-plan: #f8fafc; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--arka-plan);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            /* Aynı dalgalı arka planı buraya da ekledik */
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 20 Q 30 40, 60 20 T 120 20' fill='none' stroke='%230056b3' stroke-width='5.3' stroke-opacity='0.08' stroke-linecap='round'/%3E%3C/svg%3E");
        }

        .container {
            display: flex; flex-wrap: wrap; gap: 30px; width: 90%; max-width: 900px;
            background: var(--beyaz); padding: 40px; border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-top: 5px solid var(--ana-mavi);
        }

        .form-kutu { flex: 1; min-width: 300px; padding: 20px; }
        .cizgi { width: 1px; background-color: #eee; }
        
        @media (max-width: 768px) {
            .cizgi { width: 100%; height: 1px; }
        }

        h2 { font-family: 'Playfair Display', serif; color: var(--koyu-mavi); margin-bottom: 20px; font-size: 1.8rem; }
        
        .form-grup { margin-bottom: 15px; }
        .form-grup label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; color: var(--koyu-gri); }
        .form-grup input { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; 
            font-family: inherit; transition: 0.3s;
        }
        .form-grup input:focus { border-color: var(--ana-mavi); outline: none; box-shadow: 0 0 5px rgba(0,86,179,0.2); }

        .btn { 
            background-color: var(--ana-mavi); color: var(--beyaz); width: 100%;
            padding: 14px; border: none; cursor: pointer; font-weight: 700; 
            font-size: 1rem; border-radius: 4px; transition: all 0.3s; margin-top: 10px;
        }
        .btn:hover { background-color: var(--koyu-mavi); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .hata-mesaj { color: #dc3545; font-size: 0.9rem; font-weight: bold; margin-top: 10px; display: none; }
        .geri-don { position: absolute; top: 30px; left: 30px; text-decoration: none; color: var(--koyu-mavi); font-weight: bold; font-size: 1.1rem; }
        .geri-don:hover { color: var(--ana-mavi); }
    </style>
</head>
<body>

    <a href="index.html" class="geri-don"><i class="fa-solid fa-arrow-left"></i> Ana Sayfaya Dön</a>

    <div class="container">
        <div class="form-kutu">
            <h2>Giriş Yap</h2>
            <form id="loginForm">
                <div class="form-grup">
                    <label>E-posta Adresi</label>
                    <input type="email" id="logEmail" required>
                </div>
                <div class="form-grup">
                    <label>Şifre</label>
                    <input type="password" id="logSifre" required>
                </div>
                <div class="hata-mesaj" id="loginHata">E-posta veya şifre hatalı! Lütfen tekrar deneyin.</div>
                <button type="submit" class="btn">Giriş Yap</button>
            </form>
        </div>

        <div class="cizgi"></div>

        <div class="form-kutu">
            <h2>Yeni Hesap Oluştur</h2>
            <form id="registerForm">
                <div style="display: flex; gap:10px;">
                    <div class="form-grup" style="flex:1;">
                        <label>Ad</label>
                        <input type="text" id="regAd" required>
                    </div>
                    <div class="form-grup" style="flex:1;">
                        <label>Soyad</label>
                        <input type="text" id="regSoyad" required>
                    </div>
                </div>
                <div class="form-grup">
                    <label>E-posta Adresi</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-grup">
                    <label>Şifre Belirleyin</label>
                    <input type="password" id="regSifre" required>
                </div>
                <button type="submit" class="btn">Kayıt Ol</button>
            </form>
        </div>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('altun_users')) || [];

        // KAYIT İŞLEMİ
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const ad = document.getElementById('regAd').value.trim();
            const soyad = document.getElementById('regSoyad').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const sifre = document.getElementById('regSifre').value;

            if(users.some(u => u.email === email)) {
                alert('Bu e-posta adresi zaten kayıtlı! Lütfen sol taraftan giriş yapın.');
                return;
            }

            const yeniKullanici = { ad, soyad, email, sifre };
            users.push(yeniKullanici);
            localStorage.setItem('altun_users', JSON.stringify(users));
            
            localStorage.setItem('altun_currentUser', JSON.stringify(yeniKullanici));
            window.location.href = 'index.html'; 
        });

        // GİRİŞ İŞLEMİ
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('logEmail').value.trim();
            const sifre = document.getElementById('logSifre').value;
            const hataMesaji = document.getElementById('loginHata');

            const eslesenKullanici = users.find(u => u.email === email && u.sifre === sifre);

            if (eslesenKullanici) {
                localStorage.setItem('altun_currentUser', JSON.stringify(eslesenKullanici));
                window.location.href = 'index.html';
            } else {
                hataMesaji.style.display = 'block';
            }
        });
    </script>
</body>
</html>
